{% extends "base.html" %}
{% block title %}{{ symbol }} IV history{% endblock %}
{% block content %}
<h1>{{ symbol }} IV history</h1>
<form method="get" action="/symbols/{{ symbol }}/iv-history">
    <label>Mode
        <select name="mode">
            <option value="rolling" {% if mode == 'rolling' %}selected{% endif %}>Rolling ATM</option>
            <option value="fixed" {% if mode == 'fixed' %}selected{% endif %}>Fixed strike</option>
        </select>
    </label>
    <label>C/P
        <select name="cp">
            <option value="C" {% if cp == 'C' %}selected{% endif %}>Call</option>
            <option value="P" {% if cp == 'P' %}selected{% endif %}>Put</option>
        </select>
    </label>
    <label>Expiry
        <select name="expiry">
            <option value="">(any)</option>
            {% for e in expiries %}
                <option value="{{ e }}" {% if expiry and expiry|string == e|string %}selected{% endif %}>{{ e }}</option>
            {% endfor %}
        </select>
    </label>
    <button type="submit">Update</button>
</form>
{% if data %}
<canvas id="ivChart" width="900" height="400"></canvas>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
    const ivData = {{ data|tojson }};
    const ctx = document.getElementById('ivChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ivData.map(d => d.snapshot_ts),
            datasets: [{
                label: '{{ symbol }} {{ cp }} IV',
                data: ivData.map(d => d.iv),
                borderColor: '#06c',
                tension: 0.1,
            }],
        },
        options: { scales: { y: { beginAtZero: false } } },
    });
</script>
{% else %}
<p>No snapshots yet &mdash; run a chain job for {{ symbol }}.</p>
{% endif %}
{% endblock %}
